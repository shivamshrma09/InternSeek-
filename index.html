  <style>
    :root {

      --primary-dark: #3151a3;
      --accent: #fff3e6;
      --bg: linear-gradient(135deg, #e0eaff 0%, #f7faff 100%);

    body {

      color: var(--text);
      margin: 0;
      min-height: 100vh;
    }
    .navbar {
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(12px);
      color: var(--primary-dark);
      display: flex;
      align-items: center;
      padding: 0 38px;
      height: 66px;
      position: sticky;
      top: 0;
      z-index: 10;
      box-shadow: var(--shadow);
      border-bottom: 1.5px solid #e3eafc;
      gap: 0;
    }
    .nav-logo {
      font-size: 2.1rem;
      font-weight: 900;
      letter-spacing: 1px;
      color: var(--primary);
      display: flex;
      align-items: center;
      margin-right: 32px;
    }
    .lang-toggle {
      border: none;
      border-radius: 12px;
      padding: 4px 10px;

      background: #e3eafc;
      color: #3151a3;
      cursor: pointer;
      font-weight: 700;
      margin-right: 8px;
    }
    .btn {
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 22px;
      padding: 10px 28px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 2px 8px #4f8cff18;
      transition: background 0.2s, color 0.2s;
    }
    .btn:hover {
      background: #3151a3;
      color: #fff;
    }
    .profile-navbar {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      border-radius: 18px;
      padding: 3px 10px 3px 3px;
      transition: background 0.18s;
      margin-left: 8px;
    }
    .profile-navbar:hover {
      background: #e3ebac;
    }
    .profile-img-navbar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #4f8cff;
      background: #e3eafc;
      box-shadow: 0 2px 8px #4f8cff22;
    }
    .profile-name-navbar {
      font-weight: 700;
      color: #3151a3;
      font-size: 1.07em;
      max-width: 120px;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }
    .navbar-spacer {
      flex: 1 1 auto;
    }
    .hamburger {
      display: none;
      flex-direction: column;
      justify-content: center;
      width: 36px;
      height: 36px;
      cursor: pointer;
      margin-left: 16px;
      z-index: 1001;
    }
    .hamburger span {
      height: 4px;
      width: 28px;
      background: #3151a3;
      margin: 4px 0;
      border-radius: 2px;
      transition: 0.3s;
      display: block;
    }
    .nav-links {
      display: flex;
      align-items: center;
      gap: 0;
      transition: max-height 0.3s;
    }
    .nav-links a {
      text-decoration: none;
      color: var(--primary-dark);
      font-weight: 600;
      font-size: 1.09rem;
      margin: 0 14px;
      padding: 7px 14px;
      border-radius: 8px;
      transition: background 0.18s;
      display: block;
    }
    .nav-links a.active,
    .nav-links a:hover {
      
      background: #e3eafc;
    }
    @media (max-width: 900px) {
      .navbar {
        padding: 0 10px;
      }
    }
    @media (max-width: 700px) {
      .nav-logo {
        font-size: 1.6rem;
        margin-right: 10px;
      }
      .navbar-spacer {
        display: none;
      }
      .hamburger {
        display: flex;
      }
      .nav-links {
        position: absolute;
        top: 66px;
        right: 0;
        width: 200px;
        background: #fff;
        flex-direction: column;
        align-items: flex-start;
        max-height: 0;
        overflow: hidden;
        box-shadow: 0 6px 18px #4f8cff22;

        border-bottom-right-radius: 18px;
        transition: max-height 0.3s;
        z-index: 1000;
      }

        padding-bottom: 10px;
        border-bottom: 1.5px solid #e3eafc;
      }

        margin: 0;
        width: 100%;
        padding: 14px 0 14px 18px;
        border-radius: 0;
        border-bottom: 1px solid #e3eafc;
        font-size: 1.12rem;
      }
      .nav-links a:last-child {
        border-bottom: none;
      }

    /* HERO */
    .hero {
      margin: 40px 0 30px 0;

    .hero h1 {

      color: var(--primary-dark);

      letter-spacing: 1px;
    }
    .hero p {
      font-size: 1.25rem;
      color: #333;
      margin: 0;
      font-weight: 500;
    }
    @media (max-width: 700px) {
      .hero {
        margin: 28px 0 18px 0;
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      .hero h1 {
        font-size: 1.5rem;
        margin: 0 0 7px 0;
      }
      .hero p {
        font-size: 0.98rem;
      }
    }
    .container {
      max-width: 1100px;
      margin: 40px auto;
      padding: 0 18px;
    }
    /* FILTERS */
    .filters {
      display: flex;
      gap: 16px;
      align-items: center;
      margin: 0 auto 30px auto;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 1100px;
      background: rgba(255, 255, 255, 0.7);
      box-shadow: 0 2px 16px #4f8cff11;
      border-radius: 30px;
      padding: 18px 16px;
    }
    .filters select,
    .filters input {
      padding: 12px 18px;
      border-radius: 28px;
      border: 1.5px solid #d2e6f7;
      font-size: 1.06rem;
      background: #f7faff;
      color: #232b38;
      outline: none;
      min-width: 150px;
      box-shadow: 0 1px 8px #4f8cff11;
      transition: border 0.18s;
    }
    .filters select:focus,

    }
    .filters .btn {
      padding: 12px 24px;
      font-size: 1.06rem;
      border-radius: 28px;
      font-weight: 700;
    }
    @media (max-width: 700px) {
      .filters {
        flex-wrap: nowrap;
        overflow-x: auto;
        white-space: nowrap;
        padding: 7px 2px;
        gap: 6px;
      }
      .filters select,
      .filters input,
      .filters .btn {
        font-size: 0.85rem;
        padding: 5px 7px;
        min-width: 80px;
        max-width: 100px;
      }
    }
    /* CARDS */
    .internship-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
      gap: 22px;
      margin: 0 0 60px 0;
    }
    @media (max-width: 700px) {
      .internship-list {
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
      }
    }
    .card {
      background: var(--glass);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px 22px 20px 22px;
      display: flex;
      flex-direction: column;
      min-height: 230px;
      transition: box-shadow 0.12s, background 0.12s;
      position: relative;
      overflow: hidden;
      border-left: 8px solid var(--primary);
      border-top: 1.5px solid #e3eafc;
      backdrop-filter: blur(8px);
      margin: 0 2px;
    }
    .card:hover {
      box-shadow: 0 8px 24px #4f8cff22;
      background: #f7faff;
    }
    .card .card-header {
      display: flex;
      align-items: center;
      gap: 18px;
      margin-bottom: 10px;
    }
    .card .company-img {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      object-fit: cover;
      background: #f3f3f3;
      border: 2px solid #e3eafc;
      box-shadow: 0 1px 4px #4f8cff15;
    }
    .card h3 {
      margin: 0 0 0 0;
      color: var(--primary-dark);
      font-size: 1.17em;
      font-weight: 800;
      letter-spacing: 1px;
    }
    .card .company {
      font-size: 1.01rem;
      color: var(--muted);
      font-weight: 600;
      margin-bottom: 8px;
    }
    .card .desc {
      color: #333;
      margin-bottom: 10px;
      font-size: 1.01rem;
      flex: 1;
    }
    .card .meta {
      font-size: 0.98rem;
      color: #666;
      margin-bottom: 6px;
    }
    .badges {
      display: flex;
      gap: 8px;
      margin-bottom: 7px;
      flex-wrap: wrap;
    }
    .badge {
      display: inline-block;
      padding: 2px 11px;
      border-radius: 12px;
      font-size: 0.93em;
      font-weight: 600;
      color: #333;
      background: #e3eafc;
    }
    .badge-deadline {
      background: var(--badge-deadline);
      color: #c62828;
    }
    .badge-recommend {
      background: var(--badge-recommend);
      color: #388e3c;
    }
    .actions {
      display: flex;
      gap: 10px;
      margin-top: 7px;
      flex-wrap: wrap;
    }
    .actions button,
    .actions a {
      background: #fff;
      color: var(--primary-dark);
      border: 1.5px solid #e3eafc;
      border-radius: 8px;
      padding: 6px 13px;
      font-weight: 700;
      cursor: pointer;
      font-size: 1em;
      transition: background 0.15s, color 0.15s;
      display: flex;
      align-items: center;
      gap: 5px;
      text-decoration: none;
    }
    .actions button.bookmarked,
    .bookmark-btn.bookmarked {
      background: #ffe082;
      color: #222;
      border: 1.5px solid var(--primary);
    }
    .bookmark-btn {
      background: #fffbe6;
      color: #4f8cff;
      border: 1.5px solid #ffe082;
      border-radius: 8px;
      padding: 6px 13px;
      font-weight: 700;
      cursor: pointer;
      font-size: 1em;
      transition: background 0.15s, color 0.15s;
    }
    .bookmark-btn.bookmarked {
      background: #ffe082;
      color: #232b38;
      border: 1.5px solid #4f8cff;
    }
    .actions button.quick {
      background: #e8f5e9;
      color: #388e3c;
      border: 1.5px solid #e8f5e9;
    }
    .actions button:hover,
    .actions a:hover {
      background: #e3eafc;
      color: #3151a3;
    }
    .actions a.linkedin {
      background: #e3eafc;
      color: #0077b5;
      border: 1.5px solid #e3eafc;
      font-weight: 700;
      font-size: 1.1em;
    }
    .actions a.linkedin:hover {
      background: #0077b5;
      color: #fff;
    }
    /* Profile modal (simple) */
    .modal-bg {
      position: fixed; top:0; left:0; right:0; bottom:0;
      background: #0007; display: flex; align-items: center; justify-content: center; z-index: 9999;
    }
    .profile-modal {
      background: var(--glass);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      min-width: 320px;
      max-width: 97vw;
      padding: 36px 28px;
      overflow: hidden;
      position: relative;
      border: 2.5px solid #e3eafc;
      backdrop-filter: blur(18px);
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: modalIn 0.25s;
    }
    @keyframes modalIn {
      from { transform: scale(0.95); opacity: 0;}
      to { transform: scale(1); opacity: 1;}
    }
    .profile-modal-img {
      width: 110px; height: 110px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid #4f8cff;
      background: #fff;
      margin-bottom: 18px;
      box-shadow: 0 4px 18px #4f8cff18;
    }
    .profile-modal-close {
      position: absolute; top: 18px; right: 24px;
      background: none; border: none; font-size: 1.7em; color: #3151a3; cursor: pointer; font-weight: 900;
      transition: color 0.2s;
    }
    .profile-modal-close:hover { color: #ff7675;}
    .profile-modal h2 {
      margin: 0 0 10px 0;
      color: #4f8cff;
      font-size: 1.7em;
      font-weight: 900;
      letter-spacing: 1px;
      text-shadow: 0 2px 8px #4f8cff1a;
    }
    .profile-modal-info {
      color: #232b38;
      font-size: 1.13em;
      margin-bottom: 7px;
      word-break: break-all;
      font-weight: 600;
      letter-spacing: 0.2px;
      text-align: center;
    }
    .profile-modal-edit {
      margin-top: 7px;
      font-size: 1em;
      color: #3151a3;
      background: #fff;
      border: 1.5px solid #4f8cff;
      border-radius: 9px;
      padding: 6px 20px;
      cursor: pointer;
      font-weight: 700;
      transition: background 0.17s;
      box-shadow: 0 2px 8px #4f8cff11;
    }
    .profile-modal-edit:hover { background: #ffe082;}
    .edit-modal {
      background: rgba(255,255,255,0.96);
      border-radius: 22px;
      box-shadow: 0 8px 36px #4f8cff26;
      padding: 36px 28px;
      min-width: 320px;
      max-width: 98vw;
      position: relative;
      animation: modalIn 0.23s;
    }
    .edit-modal label {
      font-weight: 700;
      color: #3151a3;
      margin-bottom: 6px;
      display: block;
    }
    .edit-modal input {
      width: 100%;
      margin-bottom: 18px;
      padding: 11px 14px;
      border-radius: 13px;
      border: 1.5px solid #d2e6f7;
      font-size: 1.06rem;
      background: #f7faff;
      color: #232b38;
      transition: border .18s;
    }
    .edit-modal input:focus { border: 1.5px solid var(--primary);}
    .edit-modal .btn {
      padding: 12px 28px;
      border-radius: 22px;
      font-size: 1.09rem;
      font-weight: 700;
      margin-right: 10px;
    }
    @media (max-width: 700px) {
      .profile-modal { min-width: 0; padding: 18px 7px;}
      .edit-modal { padding: 10px 2px;}
    }

  <div class="hero">

  <script>
    // Hamburger menu toggle
    const hamburgerBtn = document.getElementById("hamburgerBtn");
    const navLinks = document.getElementById("navLinks");
    hamburgerBtn.onclick = function () {
      navLinks.classList.toggle("open");
    };
    Array.from(navLinks.getElementsByTagName("a")).forEach((link) => {
      link.onclick = () => navLinks.classList.remove("open");
    });
    document.addEventListener("click", function (e) {
      if (
        window.innerWidth <= 700 &&
        !navLinks.contains(e.target) &&

    function updateProfileNavbar() {
      document.getElementById('profileNavImg').src = profile.img || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(profile.name || 'User');
      document.getElementById('profileNavName').textContent = profile.name || 'Profile';
    }
    document.getElementById('profileNavBtn').onclick = function() {
      document.getElementById('modalBg').style.display = 'flex';
      document.getElementById('profileModal').style.display = 'flex';
      document.getElementById('editProfileModal').style.display = 'none';
      document.getElementById('modalProfileImg').src = profile.img || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(profile.name || 'User');
      document.getElementById('modalProfileName').textContent = profile.name || 'Your Name';
      document.getElementById('modalProfileEmail').textContent = profile.email || '';
      renderBookmarkedInternships();
    };
    function closeModal() {
      document.getElementById('modalBg').style.display = 'none';
    }
    function openEditProfileModal() {
      let f = document.getElementById('profileForm');
      f.name.value = profile.name || '';
      f.email.value = profile.email || '';
      f.image.value = '';
      document.getElementById('editProfileModal').style.display = 'block';
    }
    function closeEditProfileModal() {
      document.getElementById('editProfileModal').style.display = 'none';
    }
    document.getElementById('profileForm').onsubmit = function(e) {
      e.preventDefault();
      const data = Object.fromEntries(new FormData(this).entries());
      profile.name = data.name;
      profile.email = data.email;
      const file = this.image.files[0];
      if(file) {
        const reader = new FileReader();
        reader.onload = function(evt) {
          profile.img = evt.target.result;
          saveProfile();
        };
        reader.readAsDataURL(file);
      } else {
        saveProfile();
      }
      function saveProfile() {
        localStorage.setItem('navbarProfile', JSON.stringify(profile));
        updateProfileNavbar();
        document.getElementById('modalProfileImg').src = profile.img || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(profile.name || 'User');
        document.getElementById('modalProfileName').textContent = profile.name || 'Your Name';
        document.getElementById('modalProfileEmail').textContent = profile.email || '';
        closeEditProfileModal();
      }
    };

];


    // ---- BOOKMARK LOGIC & RENDERING ----
    let bookmarks = JSON.parse(localStorage.getItem('internseek_bookmarks') || '[]');

    function renderInternships(list) {
      const container = document.getElementById('internshipList');
      if (!list.length) {
        container.innerHTML = '<div style="padding:2em;text-align:center;color:#888;">No internships found.</div>';
        return;
      }
      
      
      container.innerHTML = list.map(intern => `
        <div class="card">
          <div class="card-header">
            <img src="${intern.img}" class="company-img" alt="${intern.company}">
            <div>
              <h3>${intern.title}</h3>
              <div class="company">${intern.company} &middot; ${intern.location}</div>
            </div>
          </div>
          <div class="desc">${intern.description}</div>
          <div class="badges">
            ${intern.tags.map(tag => `<span class="badge">${tag}</span>`).join('')}
            <span class="badge badge-deadline">Apply by ${intern.deadline}</span>
            ${intern.rating >= 4.7 ? '<span class="badge badge-recommend">⭐ Top Rated</span>' : ''}
          </div>
          <div class="actions">
            <button class="bookmark-btn ${bookmarks.includes(intern.id) ? 'bookmarked' : ''}" data-id="${intern.id}">
              ${bookmarks.includes(intern.id) ? 'Bookmarked' : 'Bookmark'}
              

              
              
              
              
              
                        </button>
            <a href="${intern.applyLink}" target="_blank" class="btn">Apply</a>
            <a href="https://www.linkedin.com/search/results/all/?keywords=${encodeURIComponent(intern.company)}" target="_blank" class="linkedin">LinkedIn</a>
          </div>
        </div>
      `).join('');
      
      
      
      


      
      
      
      
      // Add event listeners for bookmark buttons
      document.querySelectorAll('.bookmark-btn').forEach(btn => {
        btn.onclick = function() {
          const id = this.getAttribute('data-id');
          if (bookmarks.includes(id)) {
            bookmarks = bookmarks.filter(b => b !== id);
          } else {
            bookmarks.push(id);
          }
          localStorage.setItem('bookmarkedInternships', JSON.stringify(bookmarks));
          renderInternships(list); // re-render to update button state
        };
      });
    }

    function filterAndRender() {
      let list = internships.slice();
      const search = document.getElementById('searchBox').value.toLowerCase();
      const location = document.getElementById('filterLocation').value;
      const stipend = document.getElementById('filterStipend').value;
      const duration = document.getElementById('filterDuration').value;
      const sortBy = document.getElementById('sortBy').value;

      if (search) {
        list = list.filter(i =>
          i.title.toLowerCase().includes(search) ||
          i.company.toLowerCase().includes(search)
        );
      }
      if (location) list = list.filter(i => i.location === location);
      if (stipend) list = list.filter(i => Number(i.stipend) >= Number(stipend));
      if (duration) list = list.filter(i => i.duration === duration);

      if (sortBy === 'stipend') list.sort((a, b) => b.stipend - a.stipend);
      if (sortBy === 'duration') list.sort((a, b) => parseInt(b.duration) - parseInt(a.duration));
      if (sortBy === 'deadline') list.sort((a, b) => new Date(a.deadline) - new Date(b.deadline));
      if (sortBy === 'rating') list.sort((a, b) => b.rating - a.rating);

      renderInternships(list);
    }

    function populateFilters() {
      const locations = [...new Set(internships.map(i => i.location))];
      const filterLocation = document.getElementById('filterLocation');
      filterLocation.innerHTML += locations.map(l => `<option value="${l}">${l}</option>`).join('');

      const stipends = [...new Set(internships.map(i => i.stipend))].sort((a, b) => a - b);
      const filterStipend = document.getElementById('filterStipend');
      filterStipend.innerHTML += stipends.map(s => `<option value="${s}">₹${s}+</option>`).join('');

      const durations = [...new Set(internships.map(i => i.duration))];
      const filterDuration = document.getElementById('filterDuration');
      filterDuration.innerHTML += durations.map(d => `<option value="${d}">${d}</option>`).join('');
    }

    // Bookmarked internships in profile modal
    function renderBookmarkedInternships() {
      const modal = document.getElementById('profileModal');
      // Remove old section if exists
      const old = document.getElementById('bookmarkedSection');
      if (old) old.remove();
      // Get bookmarked internships
      const bookmarked = internships.filter(i => bookmarks.includes(i.id));
      // Create section
      const section = document.createElement('div');
      section.id = 'bookmarkedSection';
      section.style = 'margin-top:25px;width:100%;';
      section.innerHTML = `<h3 style="color:#3151a3;font-size:1.1em;margin-bottom:8px;">Bookmarked Internships</h3>` +
        (bookmarked.length ? bookmarked.map(i => `
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:7px;">
            <img src="${i.img}" style="width:36px;height:36px;border-radius:7px;border:1px solid #e3eafc;">
            <div style="flex:1;">
              <div style="font-weight:700;color:#232b38;font-size:1em;">${i.title}</div>
              <div style="font-size:0.93em;color:#6c7a89;">${i.company} - ${i.location}</div>
            </div>
            <a href="${i.applyLink}" target="_blank" style="padding:4px 12px;background:#4f8cff;color:#fff;border-radius:7px;font-size:0.95em;text-decoration:none;font-weight:600;">Apply</a>
            <button onclick="removeBookmark('${i.id}')" style="background:#fff;color:#c62828;border:1px solid #e3eafc;border-radius:6px;padding:3px 8px;cursor:pointer;">Remove</button>
          </div>
        `).join('') : `<div style="color:#888;">No bookmarks yet.</div>`);
      modal.appendChild(section);
    }
    window.removeBookmark = function(id) {
      bookmarks = bookmarks.filter(b => b !== id);
      localStorage.setItem('bookmarkedInternships', JSON.stringify(bookmarks));
      renderBookmarkedInternships();
      filterAndRender();
    }

    //---- INIT (run after internships array is pasted) ----
     populateFilters();
     document.getElementById('searchBox').addEventListener('input', filterAndRender);
     document.getElementById('filterLocation').addEventListener('change', filterAndRender);
     document.getElementById('filterStipend').addEventListener('change', filterAndRender);
     document.getElementById('filterDuration').addEventListener('change', filterAndRender);
     document.getElementById('sortBy').addEventListener('change', filterAndRender);
     document.getElementById('clearFilters').addEventListener('click', function() {
       document.getElementById('searchBox').value = '';
       document.getElementById('filterLocation').value = '';
      document.getElementById('filterStipend').value = '';
       document.getElementById('filterDuration').value = '';
       document.getElementById('sortBy').value = '';
       filterAndRender();
    });
     filterAndRender();
     
  </script>
</body>
